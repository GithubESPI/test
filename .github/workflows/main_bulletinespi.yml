name: Build and deploy Node.js app to Azure Web App - bulletinespi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install, Build and Standalone
        run: |
          npm ci
          npx prisma generate
          npm run build
          # On ne garde que le nécessaire absolu
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # ON N'ENVOIE QUE LE DOSSIER STANDALONE (Fini les 500Mo !)
          path: .next/standalone
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8DCFBB797F5C46F2BD03DBD4EC13F578 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0EAD5EB0E7124FFA80CCC2F5776E4166 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A8DB54A0ACBE45F0AC7047A1A989606D }}

      - name: "Deploy to Azure Web App"
        uses: azure/webapps-deploy@v3
        with:
          app-name: "bulletinespi"
          package: .
          # COMMANDE MAGIQUE : Plus besoin de node_modules, on lance le serveur compilé
          startup-command: "node server.js"
