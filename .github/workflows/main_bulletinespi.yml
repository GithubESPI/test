name: Build and deploy Node.js app to Azure Web App - bulletinespi

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # ✅ Désactivé temporairement pour éviter la boucle de redémarrage infinie
  # schedule:
  #   - cron: "*/5 * * * *"

jobs:
  # ✅ Job de health check
  healthcheck:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      site_down: ${{ steps.check.outputs.site_down }}
    steps:
      - name: Check site health
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://bulletin.groupe-espi.fr/api/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "site_down=true" >> $GITHUB_OUTPUT
          else
            echo "site_down=false" >> $GITHUB_OUTPUT
          fi

  # ✅ Redémarre Azure si le site est down
  restart:
    runs-on: ubuntu-latest
    needs: healthcheck
    if: needs.healthcheck.outputs.site_down == 'true'
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8DCFBB797F5C46F2BD03DBD4EC13F578 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0EAD5EB0E7124FFA80CCC2F5776E4166 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A8DB54A0ACBE45F0AC7047A1A989606D }}

      - name: Restart Azure App Service
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp restart --name bulletinespi --resource-group backbulletin_group

  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install, Build and Standalone
        run: |
          npm ci
          npx prisma generate
          npm run build
          # Montage du dossier standalone conforme aux besoins d'Azure
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          # ✅ CRUCIAL : Copie des fichiers Prisma générés pour le runtime
          cp -r node_modules/.prisma .next/standalone/node_modules/ || true

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'schedule'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8DCFBB797F5C46F2BD03DBD4EC13F578 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0EAD5EB0E7124FFA80CCC2F5776E4166 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A8DB54A0ACBE45F0AC7047A1A989606D }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy
        with:
          app-name: "bulletinespi"
          package: .
          # ✅ Force le port 8080 pour Azure et lance le serveur standalone
          startup-command: "PORT=8080 node server.js"
